<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教资高中数学学习记录</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 左侧导航 -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">学习记录</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="overview">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">概览</span>
                </a>
                <a href="#" class="nav-item" data-page="chapters">
                    <span class="nav-icon">📖</span>
                    <span class="nav-text">章节学习</span>
                </a>
                <a href="#" class="nav-item" data-page="notes">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">学习笔记</span>
                </a>
                <a href="#" class="nav-item" data-page="questions">
                    <span class="nav-icon">❌</span>
                    <span class="nav-text">错题本</span>
                </a>
                <a href="#" class="nav-item" data-page="plans">
                    <span class="nav-icon">📅</span>
                    <span class="nav-text">复习计划</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-export" id="exportBtn">
                    <span>💾</span> 导出数据
                </button>
                <label class="btn-import">
                    <span>📂</span> 导入数据
                    <input type="file" id="importInput" accept=".json" hidden>
                </label>
            </div>
        </aside>

        <!-- 右侧主内容 -->
        <main class="main-content">
            <!-- 概览页面 -->
            <section class="page active" id="page-overview">
                <header class="page-header">
                    <h1>学习概览</h1>
                    <p class="page-subtitle">记录你的每一次进步</p>
                </header>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📖</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-chapters">0</span>
                            <span class="stat-label">已学章节</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-completed">0</span>
                            <span class="stat-label">已完成</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📝</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-notes">0</span>
                            <span class="stat-label">学习笔记</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">❌</div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-questions">0</span>
                            <span class="stat-label">错题记录</span>
                        </div>
                    </div>
                </div>
                <div class="overview-content">
                    <div class="card">
                        <h3 class="card-title">📅 今日复习计划</h3>
                        <div class="today-plans" id="todayPlans">
                            <p class="empty-text">暂无今日计划</p>
                        </div>
                    </div>
                    <div class="card">
                        <h3 class="card-title">❌ 待巩固错题</h3>
                        <div class="pending-questions" id="pendingQuestions">
                            <p class="empty-text">暂无错题</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 章节学习页面 -->
            <section class="page" id="page-chapters">
                <header class="page-header">
                    <h1>章节学习</h1>
                    <p class="page-subtitle">高中数学知识体系</p>
                </header>
                <div class="chapters-container" id="chaptersContainer">
                    <!-- 章节内容将通过 JS 动态渲染 -->
                </div>
            </section>

            <!-- 学习笔记页面 -->
            <section class="page" id="page-notes">
                <header class="page-header">
                    <h1>学习笔记</h1>
                    <button class="btn-primary" id="addNoteBtn">+ 添加笔记</button>
                </header>
                <div class="notes-filters">
                    <input type="text" class="search-input" id="noteSearch" placeholder="搜索笔记...">
                    <select class="filter-select" id="noteChapterFilter">
                        <option value="">所有章节</option>
                    </select>
                </div>
                <div class="notes-list" id="notesList">
                    <!-- 笔记列表将通过 JS 动态渲染 -->
                </div>
            </section>

            <!-- 错题本页面 -->
            <section class="page" id="page-questions">
                <header class="page-header">
                    <h1>错题本</h1>
                    <button class="btn-primary" id="addQuestionBtn">+ 添加错题</button>
                </header>
                <div class="questions-filters">
                    <select class="filter-select" id="questionChapterFilter">
                        <option value="">所有章节</option>
                    </select>
                    <select class="filter-select" id="questionStatusFilter">
                        <option value="">所有状态</option>
                        <option value="unmastered">未掌握</option>
                        <option value="mastered">已掌握</option>
                    </select>
                </div>
                <div class="questions-list" id="questionsList">
                    <!-- 错题列表将通过 JS 动态渲染 -->
                </div>
            </section>

            <!-- 复习计划页面 -->
            <section class="page" id="page-plans">
                <header class="page-header">
                    <h1>复习计划</h1>
                    <button class="btn-primary" id="addPlanBtn">+ 添加计划</button>
                </header>
                <div class="plans-container">
                    <div class="plans-pending" id="plansPending">
                        <h3 class="plans-section-title">待完成</h3>
                        <!-- 计划列表将通过 JS 动态渲染 -->
                    </div>
                    <div class="plans-completed" id="plansCompleted">
                        <h3 class="plans-section-title">已完成</h3>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="modalContainer">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">标题</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 模态框内容将通过 JS 动态渲染 -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
